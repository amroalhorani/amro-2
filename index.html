<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الطاولة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #000;
            color: #f39c12;
            text-align: center;
            padding: 15px;
            font-size: 28px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
            flex-grow: 1;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .btn:active { transform: scale(0.95); }

        /* الألوان المطلوبة */
        .btn-menu { background: linear-gradient(135deg, #e67e22, #d35400); }
        .btn-location { background: linear-gradient(135deg, #3498db, #2980b9); }
        .btn-video { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn-waiter { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .btn-bill { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #000; }
        .btn-games { background: linear-gradient(135deg, #9b59b6, #8e44ad); }

    </style>
</head>
<body>

<header>الطاولة الذكية</header>

<div class="container">
    <button class="btn btn-menu" onclick="alert('فتح المنيو...')">المنيو</button>
    <button class="btn btn-location" onclick="alert('عرض الموقع...')">الموقع</button>
    <button class="btn btn-video" onclick="alert('تشغيل الفيديو...')">فيديو</button>
    <button class="btn btn-waiter" onclick="alert('يتم نداء الويتر الآن...')">نداء الويتر</button>
    <button class="btn btn-bill" onclick="alert('عرض الفاتورة...')">الفاتورة</button>
    <button class="btn btn-games" onclick="alert('تحميل الألعاب...')">الألعاب</button>
</div>

</body>
</html>
